name: Auto Trigger Kaggle Stream

on:
  schedule:
    - cron: '0 */11 * * *'  # සෑම පැය 11කටම වරක් ස්වයංක්‍රීයව රන් වේ
  workflow_dispatch:        # Manual ලෙස බටන් එකෙන් රන් කිරීමට

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Run Kaggle Kernel
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          kaggle kernels push -p .
