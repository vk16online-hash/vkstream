name: Auto Trigger Kaggle Stream

on:
  schedule:
    - cron: '0 */11 * * *'  # සෑම පැය 11කටම වරක් ස්වයංක්‍රීයව රන් වේ
  workflow_dispatch:        # Manual ලෙස බටන් එකෙන් රන් කිරීමට

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}  # මුළු Job එකටම Token එක ලබා දීම

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Latest Kaggle CLI
        run: pip install --upgrade kaggle

      - name: Authenticate Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Run Kaggle Kernel
        run: |
          kaggle kernels push -p .
