name: Live Stream
on: [workflow_dispatch] # මෙය ක්ලික් කළ විට විතරක් ස්ට්‍රීම් එක පටන් ගන්නා ලෙස සැකසුම

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start Streaming
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -re -stream_loop -1 -i background.mp4 -vf "drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:textfile=news.txt:reload=1:y=h-50:x=w-mod(t*100\,w+tw):fontcolor=white:fontsize=40:box=1:boxcolor=black@0.5" -c:v libx264 -preset ultrafast -tune zerolatency -b:v 1500k -maxrate 1500k -bufsize 3000k -pix_fmt yuv420p -c:a aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
