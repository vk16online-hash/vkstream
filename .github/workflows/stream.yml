name: Live Stream
on: [workflow_dispatch]

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu python3-pip
          pip3 install feedparser
          python3 update_news.py &
          
      - name: Start Streaming
        run: |
          ffmpeg -re -stream_loop -1 -i background.mp4 -vf "
          drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:textfile=news.txt:reload=1:y=h-60:x=w-mod(t*120\,w+tw):fontsize=32:fontcolor=white:box=1:boxcolor=black@0.7:boxborderw=15,
          drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:textfile=dashboard.txt:reload=1:x=w-500:y=70:fontsize=24:fontcolor=white:box=1:boxcolor=0x0000FF@0.4:boxborderw=20:line_spacing=45" \
          -c:v libx264 -preset ultrafast -tune zerolatency -b:v 2000k -maxrate 2000k -bufsize 4000k -g 50 -keyint_min 50 -sc_threshold 0 -pix_fmt yuv420p -c:a aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
