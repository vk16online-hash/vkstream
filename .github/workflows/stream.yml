name: 24-7 F1 Live Telemetry Streamer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  repository_dispatch:
    types: [restart_stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        pip install opencv-python-headless requests imageio[ffmpeg] imageio-ffmpeg fastapi uvicorn

    - name: Run Telemetry Engine with Timeout
      env:
        YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
      run: |
        timeout 19800 python app.py || true

    - name: Trigger Next Loop (24/7 Automation)
      env:
        GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
      run: |
        curl -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart_stream"}'
